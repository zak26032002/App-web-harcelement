

services:
  db:
    image: mysql:8.0
    container_name: mysql_harcelement
    restart: always
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_hugo
    restart: always
    ports:
      - "8080:80" # On l'ouvre sur le port 8080
    environment:
      PMA_HOST: db 
      PMA_USER: user
      PMA_PASSWORD: password
    depends_on:
      - db

volumes:
  db_data: 